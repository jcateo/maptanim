    <line x1="340" y1="60" x2="340" y2="620" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6,4" style="fill:rgb(0, 0, 0);stroke:rgb(46, 125, 50);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-dasharray:6px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
