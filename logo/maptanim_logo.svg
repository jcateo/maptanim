    <path d="M432 435 Q412 418 400 404" stroke="#a5d6a7" stroke-width="2.5" fill="none" stroke-linecap="round" style="fill:none;stroke:rgb(165, 214, 167);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="399" cy="402" rx="14" ry="8" fill="#a5d6a7" transform="rotate(-25 399 402)" style="fill:rgb(165, 214, 167);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
