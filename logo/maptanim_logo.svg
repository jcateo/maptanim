    <path d="M340 380 Q362 368 375 358" stroke="#1b5e20" stroke-width="1" fill="none" opacity="0.5" style="fill:none;stroke:rgb(27, 94, 32);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
