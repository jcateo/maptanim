<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">MapTanim Logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A circular logo combining a map pin, leaf, and field grid representing MapTanim — an intercropping geomapping platform</desc>

  

  <defs>
    <clipPath id="hexclip">
      <polygon points="340,60 560,185 560,495 340,620 120,495 120,185"/>
    </clipPath>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="100%" stop-color="#a8d5b5"/>
    </linearGradient>
    <linearGradient id="soilgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8B6220"/>
    </linearGradient>
    <linearGradient id="leafgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="pingrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </linearGradient>
  </defs>

  <!-- Hex background: sky -->
